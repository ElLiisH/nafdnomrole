<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Staff to Nominal Roll</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 20px;
        }
        .form-container {
            max-width: 700px;
            margin: auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full-width {
            grid-column: span 2;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
            color: #555;
        }
        input, select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95em;
        }
        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add New Staff Entry</h2>
    <form id="addStaffForm" action="#" method="POST">
        <div class="form-grid">
            
            <!-- Personal Details -->
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Mr, Mrs, Dr">
            </div>

            <div class="form-group">
                <label for="staff_id">Staff ID *</label>
                <input type="text" id="staff_id" name="staff_id" required placeholder="Unique Staff ID">
            </div>

            <div class="form-group">
                <label for="surname">Surname *</label>
                <input type="text" id="surname" name="surname" required>
            </div>

            <div class="form-group">
                <label for="first_name">First Name *</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>

            <div class="form-group full-width">
                <label for="other_names">Other Names</label>
                <input type="text" id="other_names" name="other_names">
            </div>

            <!-- Professional / Rank Info -->
            <div class="form-group">
                <label for="qualification">Qualification</label>
                <input type="text" id="qualification" name="qualification" placeholder="e.g. B.Sc, HND">
            </div>

            <div class="form-group">
                <label for="rank">Rank</label>
                <input type="text" id="rank" name="rank">
            </div>

            <div class="form-group">
                <label for="dept">Department</label>
                <input type="text" id="dept" name="dept">
            </div>

            <div class="form-group">
                <label for="location">Location / Station</label>
                <input type="text" id="location" name="location">
            </div>

            <div class="form-group">
                <label for="state">State of Origin</label>
                <input type="text" id="state" name="state">
            </div>

            <!-- Dates Section -->
            <div class="form-group">
                <label for="first_appt_date">First Appointment Date</label>
                <input type="date" id="first_appt_date" name="first_appt_date">
            </div>

            <div class="form-group">
                <label for="current_appt_date">Current Appointment Date</label>
                <input type="date" id="current_appt_date" name="current_appt_date">
            </div>

            <div class="form-group">
                <label for="date_confirmed">Date Confirmed</label>
                <input type="date" id="date_confirmed" name="date_confirmed">
            </div>

        </div>

        <div class="actions full-width">
            <a href="javascript:history.back()" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-submit">Save Staff Record</button>
        </div>
    </form>
</div>

</body>
</html>
