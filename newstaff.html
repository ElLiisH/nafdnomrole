<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Staff to Nominal Roll</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 20px;
        }
        .form-container {
            max-width: 700px;
            margin: auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full-width {
            grid-column: span 2;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
            color: #555;
        }
        input, select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95em;
        }
        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
        }
        .btn-submit:disabled {
            background-color: #8bc34a;
            cursor: not-allowed;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            text-align: center;
        }
        .alert {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: none;
            font-weight: bold;
        }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* DEBUG CONSOLE STYLES */
        .debug-panel {
            margin-top: 25px;
            background: #1e1e1e;
            color: #00ff66;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
        }
        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            margin-bottom: 10px;
            color: #ffffff;
        }
        .debug-log {
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn-copy {
            background: #007bff;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add New Staff Entry</h2>

    <div id="statusAlert" class="alert"></div>

    <form id="addStaffForm">
        <div class="form-grid">
            
            <!-- Personal Details -->
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Mr, Mrs, Dr">
            </div>

            <div class="form-group">
                <label for="staff_id">Staff ID *</label>
                <input type="text" id="staff_id" name="staff_id" required placeholder="Unique Staff ID">
            </div>

            <div class="form-group">
                <label for="surname">Surname *</label>
                <input type="text" id="surname" name="surname" required>
            </div>

            <div class="form-group">
                <label for="first_name">First Name *</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>

            <div class="form-group full-width">
                <label for="other_names">Other Names</label>
                <input type="text" id="other_names" name="other_names">
            </div>

            <!-- Professional / Rank Info -->
            <div class="form-group">
                <label for="qualification">Qualification</label>
                <input type="text" id="qualification" name="qualification" placeholder="e.g. B.Sc, HND">
            </div>

            <div class="form-group">
                <label for="rank">Rank</label>
                <input type="text" id="rank" name="rank">
            </div>

            <div class="form-group">
                <label for="dept">Department</label>
                <input type="text" id="dept" name="dept">
            </div>

            <div class="form-group">
                <label for="location">Location / Station</label>
                <input type="text" id="location" name="location">
            </div>

            <div class="form-group">
                <label for="state">State of Origin</label>
                <input type="text" id="state" name="state">
            </div>

            <!-- Dates Section -->
            <div class="form-group">
                <label for="first_appt_date">First Appointment Date</label>
                <input type="date" id="first_appt_date" name="first_appt_date">
            </div>

            <div class="form-group">
                <label for="current_appt_date">Current Appointment Date</label>
                <input type="date" id="current_appt_date" name="current_appt_date">
            </div>

            <div class="form-group">
                <label for="date_confirmed">Date Confirmed</label>
                <input type="date" id="date_confirmed" name="date_confirmed">
            </div>

        </div>

        <div class="actions full-width">
            <a href="javascript:history.back()" class="btn btn-cancel">Cancel</a>
            <button type="submit" id="submitBtn" class="btn btn-submit">Save Staff Record</button>
        </div>
    </form>

    <!-- DEBUG CONSOLE COMPONENT -->
    <div class="debug-panel">
        <div class="debug-header">
            <span><strong>Live Debug Console</strong></span>
            <button class="btn-copy" onclick="copyDebugLog()">Copy Log</button>
        </div>
        <div id="debugLog" class="debug-log">Ready for form submission...</div>
    </div>
</div>

<script>
    const form = document.getElementById('addStaffForm');
    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('statusAlert');
    const debugLog = document.getElementById('debugLog');

    function logDebug(message) {
        const timestamp = new Date().toISOString().substring(11, 19);
        debugLog.textContent += `\n[${timestamp}] ${message}`;
        debugLog.scrollTop = debugLog.scrollHeight;
    }

    function copyDebugLog() {
        navigator.clipboard.writeText(debugLog.textContent);
        alert('Debug log copied to clipboard!');
    }

    function showAlert(message, isError = false) {
        alertBox.textContent = message;
        alertBox.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
        alertBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';
        alertBox.style.display = 'none';

        const formData = new FormData(form);
        const payload = {};
        formData.forEach((value, key) => {
            payload[key] = value.trim();
        });

        logDebug(`Initiating POST request to /api/staff`);
        logDebug(`Payload keys sent: ${Object.keys(payload).join(', ')}`);

        try {
            const startTime = performance.now();
            const response = await fetch('/api/staff', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const duration = Math.round(performance.now() - startTime);
            logDebug(`Response Received | Status: ${response.status} ${response.statusText} | Duration: ${duration}ms`);

            const rawText = await response.text();
            logDebug(`Raw Server Response: ${rawText}`);

            let result;
            try {
                result = JSON.parse(rawText);
            } catch (pErr) {
                logDebug(`Failed to parse response as JSON.`);
                throw new Error('Server returned non-JSON response.');
            }

            if (!response.ok) {
                throw new Error(result.error || 'Failed to submit form');
            }

            showAlert('Staff record successfully saved!');
            logDebug('SUCCESS: Record created in database.');
            form.reset();
        } catch (err) {
            console.error('Submission Error:', err);
            logDebug(`ERROR CAUGHT: ${err.message}`);
            showAlert(`Error: ${err.message}`, true);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Save Staff Record';
        }
    });
</script>

</body>
</html>
