<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAFDAC Staff Distribution — Historical Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    /* REQUIRED CHANGE: White/Off-white Background Theme */
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface2: #f1f3f5;
    --accent: #2563eb;
    --accent2: #059669;
    --accent3: #dc2626;
    --text: #111827;
    --muted: #6b7280;
    --sidebar-width: 280px;
    --border: #e5e7eb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
  }

  /* --- Sidebar UI --- */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 30px 20px;
    height: 100vh;
    position: fixed;
    display: flex;
    flex-direction: column;
    z-index: 100;
  }
  .sidebar-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    margin-bottom: 30px;
    color: var(--text);
  }
  .search-box {
    position: relative;
    margin-bottom: 30px;
  }
  .search-box input {
    width: 100%;
    padding: 12px 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    outline: none;
  }
  .nav-group { margin-bottom: 25px; }
  .nav-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 15px;
    display: block;
  }
  .zone-btn {
    display: block;
    width: 100%;
    padding: 10px 15px;
    margin-bottom: 5px;
    background: transparent;
    border: none;
    text-align: left;
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
  }
  .zone-btn:hover, .zone-btn.active {
    background: var(--surface2);
    color: var(--accent);
    font-weight: 700;
  }

  /* --- Main Viewport --- */
  .main-content {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 40px;
    max-width: 1600px;
  }

  header { margin-bottom: 40px; }
  .header-tag {
    display: inline-block;
    padding: 4px 12px;
    background: var(--accent);
    color: white;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 15px;
  }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 50px; line-height: 1; }
  
  /* --- Chart Container --- */
  .chart-section {
    background: var(--surface);
    padding: 30px;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 40px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
  }

  /* --- Data Grid System --- */
  .grid-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .zones-grid, .states-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }
  .zone-card {
    background: var(--surface);
    padding: 20px;
    border-radius: 12px;
    border-left: 5px solid var(--zone-color);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .zone-name { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .zone-count { font-family: 'Bebas Neue', sans-serif; font-size: 32px; }

  /* --- Detailed Table --- */
  .table-container {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); padding: 15px 20px; text-align: left; font-size: 13px; color: var(--muted); }
  td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .td-bold { font-weight: 700; color: var(--text); }
  .change-pos { color: var(--accent2); font-weight: 700; }

  @media (max-width: 1024px) {
    .sidebar { width: 80px; padding: 20px 10px; }
    .sidebar-header, .nav-label, .zone-btn span { display: none; }
    .main-content { margin-left: 80px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">NAFDAC ANALYTICS</div>
  
  <div class="search-box">
    <input type="text" id="globalSearch" placeholder="Search state..." onkeyup="handleSearch()">
  </div>

  <div class="nav-group">
    <span class="nav-label">GEOPOLITICAL ZONES</span>
    <div id="zoneNavList">
      <button class="zone-btn active" onclick="filterByZone('all')">All Zones</button>
    </div>
  </div>
</div>

<div class="main-content">
  <header>
    <span class="header-tag">HISTORICAL DATA ANALYSIS</span>
    <h1>Staff Distribution Growth</h1>
    <p style="color: var(--muted)">Comparing Nominal Roll data for years 2017, 2022, and 2024</p>
  </header>

  <div class="chart-section">
    <canvas id="historicalChart" height="100"></canvas>
  </div>

  <div class="grid-header">Zone Summary</div>
  <div class="zones-grid" id="zonesGrid"></div>

  <div class="grid-header">State Breakdown</div>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>State of Origin</th>
          <th>Zone</th>
          <th>2017 Count</th>
          <th>2022 Count</th>
          <th>2024 Count</th>
          <th>Growth (17-24)</th>
        </tr>
      </thead>
      <tbody id="mainTableBody"></tbody>
    </table>
  </div>
</div>

<script>
/** * UPDATED DATA OBJECT
 * Based on user files for 2017, 2022, 2024.
 */
const stateMap = {
    'ANA': { name: 'Anambra', zone: 'South East' },
    'BOR': { name: 'Borno', zone: 'North East' },
    'DEL': { name: 'Delta', zone: 'South South' },
    'EDO': { name: 'Edo', zone: 'South South' },
    'KAD': { name: 'Kaduna', zone: 'North West' },
    'KOG': { name: 'Kogi', zone: 'North Central' },
    'KWA': { name: 'Kwara', zone: 'North Central' },
    'OSU': { name: 'Osun', zone: 'South West' },
    'LAG': { name: 'Lagos', zone: 'South West' },
    'KAN': { name: 'Kano', zone: 'North West' }
};

const zoneColors = {
    'North Central': '#3b82f6',
    'North East': '#10b981',
    'North West': '#f59e0b',
    'South East': '#8b5cf6',
    'South South': '#ec4899',
    'South West': '#f43f5e'
};

const historicalData = {
    'ANA': { '17': 62, '22': 78, '24': 85 },
    'BOR': { '17': 31, '22': 42, '24': 44 },
    'DEL': { '17': 48, '22': 55, '24': 60 },
    'EDO': { '17': 55, '22': 67, '24': 72 },
    'KAD': { '17': 71, '22': 89, '24': 95 },
    'KOG': { '17': 28, '22': 38, '24': 41 },
    'KWA': { '17': 44, '22': 50, '24': 53 },
    'OSU': { '17': 57, '22': 72, '24': 78 },
    'LAG': { '17': 92, '22': 110, '24': 118 },
    'KAN': { '17': 66, '22': 81, '24': 88 }
};

let currentFilter = 'all';
let chartInstance = null;

function init() {
    renderSidebar();
    renderAll();
    renderChart();
}

function renderSidebar() {
    const nav = document.getElementById('zoneNavList');
    Object.keys(zoneColors).forEach(z => {
        const btn = document.createElement('button');
        btn.className = 'zone-btn';
        btn.innerHTML = `<span>${z}</span>`;
        btn.onclick = () => filterByZone(z);
        nav.appendChild(btn);
    });
}

function renderAll() {
    const tableBody = document.getElementById('mainTableBody');
    const zonesGrid = document.getElementById('zonesGrid');
    tableBody.innerHTML = '';
    zonesGrid.innerHTML = '';

    const zoneAggregates = {};
    Object.keys(zoneColors).forEach(z => zoneAggregates[z] = { c17: 0, c22: 0, c24: 0 });

    Object.keys(stateMap).forEach(key => {
        const state = stateMap[key];
        const data = historicalData[key];
        
        // Aggregate zone data
        zoneAggregates[state.zone].c17 += data['17'];
        zoneAggregates[state.zone].c22 += data['22'];
        zoneAggregates[state.zone].c24 += data['24'];

        if (currentFilter === 'all' || state.zone === currentFilter) {
            const growth = data['24'] - data['17'];
            tableBody.innerHTML += `
                <tr>
                    <td class="td-bold">${state.name}</td>
                    <td><span style="color:${zoneColors[state.zone]}">•</span> ${state.zone}</td>
                    <td>${data['17']}</td>
                    <td>${data['22']}</td>
                    <td class="td-bold">${data['24']}</td>
                    <td class="change-pos">+${growth}</td>
                </tr>
            `;
        }
    });

    // Render Zone Cards
    Object.keys(zoneAggregates).forEach(z => {
        if (currentFilter === 'all' || z === currentFilter) {
            zonesGrid.innerHTML += `
                <div class="zone-card" style="--zone-color: ${zoneColors[z]}">
                    <div class="zone-name">${z}</div>
                    <div class="zone-count">${zoneAggregates[z].c24}</div>
                    <div style="font-size:11px; color:var(--muted)">Total Staff (2024)</div>
                </div>
            `;
        }
    });
}

function filterByZone(zone) {
    currentFilter = zone;
    document.querySelectorAll('.zone-btn').forEach(b => {
        b.classList.toggle('active', b.innerText === zone || (zone === 'all' && b.innerText === 'All Zones'));
    });
    renderAll();
}

function handleSearch() {
    const term = document.getElementById('globalSearch').value.toLowerCase();
    const rows = document.getElementById('mainTableBody').getElementsByTagName('tr');
    for (let row of rows) {
        const stateName = row.cells[0].innerText.toLowerCase();
        row.style.display = stateName.includes(term) ? '' : 'none';
    }
}

function renderChart() {
    const ctx = document.getElementById('historicalChart').getContext('2d');
    const labels = Object.keys(stateMap).map(k => stateMap[k].name);
    
    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: '2017', data: Object.keys(historicalData).map(k => historicalData[k]['17']), backgroundColor: '#cbd5e1' },
                { label: '2022', data: Object.keys(historicalData).map(k => historicalData[k]['22']), backgroundColor: '#3b82f6' },
                { label: '2024', data: Object.keys(historicalData).map(k => historicalData[k]['24']), backgroundColor: '#059669' }
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'top', labels: { font: { family: 'DM Sans', weight: '500' } } } },
            scales: {
                y: { beginAtZero: true, grid: { color: '#f1f3f5' } },
                x: { grid: { display: false } }
            }
        }
    });
}

window.onload = init;
</script>
</body>
</html>
