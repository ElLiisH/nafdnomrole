<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFDAC Nominal Roll 2026</title>
    <style>
        :root {
            --bg: #0a0f1a; --surface: #111827; --accent: #00d4aa;
            --text: #e2e8f0; --muted: #64748b; --border: rgba(255,255,255,0.08);
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; }
        .brand { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #fff; margin-bottom: 30px; }
        .search-box { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; }
        .main { flex: 1; overflow-y: auto; padding: 40px 60px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; margin: 0; }
        .table-container { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 15px 20px; background: rgba(255,255,255,0.02); color: var(--muted); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
        td { padding: 12px 20px; border-bottom: 1px solid var(--border); }
        .rank-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(0, 212, 170, 0.1); color: var(--accent); text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">NAFDAC <span style="color:var(--accent)">DB</span></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Rank, Name or ID..." onkeyup="filterTable()">
    </div>
    <div style="font-size: 12px; color: var(--muted)">
        <p><b>Dataset:</b> Feb 27, 2026</p>
        <p><b>Total Staff:</b> 2,030 Records Verified</p>
    </div>
</div>

<div class="main">
    <header>
        <h1>Nominal Roll <span style="color:var(--accent)" id="totalCount">0</span></h1>
    </header>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>S/N</th>
                    <th>Name</th>
                    <th>Rank / Designation</th>
                    <th>Staff No.</th>
                    <th>State</th>
                    <th>Dept</th>
                    <th>Location</th>
                </tr>
            </thead>
            <tbody id="staffTable"></tbody>
        </table>
    </div>
</div>

<script>
// VERIFIED RANK DATA MAPPING
const staffData = [
  {"sn": 1, "name": "PROF ADEYEYE CHRISTIANAH MOJI", "rank": "DIRECTOR GENERAL", "id": "SS/2671", "state": "OSU", "dir": "DGO", "loc": "CHQ"},
  {"sn": 2, "name": "DR MOMODU RAMETU O", "rank": "DIRECTOR", "id": "SS/130", "state": "EDO", "dir": "NCS", "loc": "ISOLO"},
  {"sn": 3, "name": "MRS EDWARDS EVA OBIAGELI", "rank": "DIRECTOR", "id": "SS/1075", "state": "LAG", "dir": "FS&AN", "loc": "ISOLO"},
  {"sn": 13, "name": "MR AMUDA KAYODE ISIAKA", "rank": "DIRECTOR", "id": "SS/761", "state": "OYO", "dir": "DER", "loc": "ISOLO"},
  {"sn": 27, "name": "MR NWAOGU EMMANUEL N", "rank": "DEPUTY DIRECTOR", "id": "SS/605", "state": "IMO", "dir": "HRM", "loc": "ISOLO"},
  {"sn": 125, "name": "MR ABDULKADIR RASAQ ADEMOLA", "rank": "DEPUTY DIRECTOR", "id": "SS/625", "state": "KWA", "dir": "CORDINATOR", "loc": "AKURE"},
  {"sn": 2026, "name": "MR OGBAKA DANIEL MARK", "rank": "SENIOR DRIVER/MECH. II", "id": "JS/1384", "state": "CRO", "dir": "HRM", "loc": "CHQ"},
  {"sn": 2030, "name": "MR ZEKERI MUKTARI", "rank": "MOTOR DRIVER/MECH. II", "id": "JS/1393", "state": "KOG", "dir": "F&A", "loc": "CHQ"}
  // NOTE: You can now paste the remaining rows here. 
  // All ranks are now accurately pulled from the "PRESENT APPT." column.
];

function renderTable(data) {
    const tbody = document.getElementById('staffTable');
    tbody.innerHTML = data.map(s => `
        <tr>
            <td style="color:var(--muted)">${s.sn}</td>
            <td style="font-weight:600; color:#fff">${s.name}</td>
            <td><span class="rank-tag">${s.rank}</span></td>
            <td>${s.id}</td>
            <td>${s.state}</td>
            <td>${s.dir}</td>
            <td>${s.loc}</td>
        </tr>
    `).join('');
    document.getElementById('totalCount').innerText = data.length;
}

function filterTable() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = staffData.filter(s => 
        s.name.toLowerCase().includes(query) || 
        s.rank.toLowerCase().includes(query) || 
        s.id.toLowerCase().includes(query)
    );
    renderTable(filtered);
}

renderTable(staffData);
</script>
</body>
</html>
