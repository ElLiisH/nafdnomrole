<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAFDAC Staff Distribution — Historical Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,300;0,500;0,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface2: #f1f3f5;
    --accent: #2563eb;
    --accent2: #059669;
    --accent3: #dc2626;
    --text: #111827;
    --muted: #6b7280;
    --sidebar-width: 280px;
    --border: #e5e7eb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
  }

  .sidebar {
    width: var(--sidebar-width);
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 30px 20px;
    height: 100vh;
    position: fixed;
    display: flex;
    flex-direction: column;
    z-index: 100;
  }
  .sidebar-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    margin-bottom: 30px;
  }
  .search-box input {
    width: 100%;
    padding: 12px 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    margin-bottom: 20px;
  }
  .nav-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; display: block; }
  
  .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; max-width: 1600px; }
  header { margin-bottom: 40px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 50px; line-height: 1; }

  .chart-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }
  .chart-section {
    background: var(--surface);
    padding: 25px;
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
  }
  .chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; margin-bottom: 15px; color: var(--accent); }

  .table-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); padding: 15px 20px; text-align: left; font-size: 13px; color: var(--muted); }
  td { padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .td-bold { font-weight: 700; }
  .down { color: var(--accent3); font-weight: bold; }
  .up { color: var(--accent2); font-weight: bold; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">NAFDAC ANALYTICS</div>
  <div class="search-box">
    <input type="text" id="globalSearch" placeholder="Filter states..." onkeyup="handleSearch()">
  </div>
  <span class="nav-label">Historical View</span>
  <p style="font-size: 12px; color: var(--muted)">Displaying all 36 States + FCT alphabetically.</p>
</div>

<div class="main-content">
  <header>
    <h1>Staff Nominal Roll Comparison</h1>
    <p style="color: var(--muted)">Comprehensive Comparison: 2017 vs 2022 vs 2024</p>
  </header>

  <div class="chart-container">
    <div class="chart-section">
      <div class="chart-title">Zonal Comparison (Total Staff)</div>
      <canvas id="zonalChart"></canvas>
    </div>
    <div class="chart-section">
      <div class="chart-title">Growth Trend (National)</div>
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>State / Territory (Alphabetical)</th>
          <th>Zone</th>
          <th>2017</th>
          <th>2022</th>
          <th>2024</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="mainTableBody"></tbody>
    </table>
  </div>
</div>

<script>
const zoneMap = {
    "North Central": ["Benue", "FCT (Abuja)", "Kogi", "Kwara", "Nasarawa", "Niger", "Plateau"],
    "North East": ["Adamawa", "Bauchi", "Borno", "Gombe", "Taraba", "Yobe"],
    "North West": ["Jigawa", "Kaduna", "Kano", "Katsina", "Kebbi", "Sokoto", "Zamfara"],
    "South East": ["Abia", "Anambra", "Ebonyi", "Enugu", "Imo"],
    "South South": ["Akwa Ibom", "Bayelsa", "Cross River", "Delta", "Edo", "Rivers"],
    "South West": ["Ekiti", "Lagos", "Ogun", "Ondo", "Osun", "Oyo"]
};

// FULL ALPHABETICAL DATA (36 States + FCT)
const rawData = {
    "Abia": [51, 50, 48], "Adamawa": [32, 31, 30], "Akwa Ibom": [51, 47, 45], "Anambra": [148, 134, 129],
    "Bauchi": [35, 32, 31], "Bayelsa": [14, 14, 14], "Benue": [47, 42, 39], "Borno": [42, 41, 39],
    "Cross River": [38, 36, 34], "Delta": [83, 77, 73], "Ebonyi": [19, 19, 18], "Edo": [96, 92, 87],
    "Ekiti": [32, 31, 29], "Enugu": [69, 62, 61], "FCT (Abuja)": [48, 44, 43], "Gombe": [21, 20, 19],
    "Imo": [79, 71, 67], "Jigawa": [19, 19, 18], "Kaduna": [71, 69, 65], "Kano": [76, 69, 64],
    "Katsina": [40, 38, 37], "Kebbi": [21, 20, 19], "Kogi": [71, 68, 63], "Kwara": [64, 60, 58],
    "Lagos": [101, 92, 89], "Nasarawa": [33, 31, 30], "Niger": [44, 41, 38], "Ogun": [97, 93, 91],
    "Ondo": [73, 70, 67], "Osun": [81, 79, 74], "Oyo": [88, 83, 82], "Plateau": [36, 34, 33],
    "Rivers": [44, 42, 40], "Sokoto": [25, 24, 22], "Taraba": [19, 18, 18], "Yobe": [16, 16, 16], "Zamfara": [15, 15, 14]
};

function init() {
    renderTable();
    renderCharts();
}

function renderTable() {
    const tbody = document.getElementById('mainTableBody');
    const sortedStates = Object.keys(rawData).sort();
    
    sortedStates.forEach(state => {
        const vals = rawData[state];
        const zone = Object.keys(zoneMap).find(z => zoneMap[z].includes(state));
        const statusClass = vals[2] < vals[0] ? 'down' : 'up';
        const arrow = vals[2] < vals[0] ? '▼' : '▲';

        tbody.innerHTML += `
            <tr>
                <td class="td-bold">${state}</td>
                <td>${zone}</td>
                <td>${vals[0]}</td>
                <td>${vals[1]}</td>
                <td class="td-bold">${vals[2]}</td>
                <td class="${statusClass}">${arrow} ${Math.abs(vals[2]-vals[0])}</td>
            </tr>`;
    });
}

function renderCharts() {
    // 1. Zonal Aggregation
    const zonalData = { labels: Object.keys(zoneMap), y17: [], y22: [], y24: [] };
    
    Object.keys(zoneMap).forEach(zone => {
        let sum17 = 0, sum22 = 0, sum24 = 0;
        zoneMap[zone].forEach(state => {
            sum17 += rawData[state][0];
            sum22 += rawData[state][1];
            sum24 += rawData[state][2];
        });
        zonalData.y17.push(sum17);
        zonalData.y22.push(sum22);
        zonalData.y24.push(sum24);
    });

    const ctxZonal = document.getElementById('zonalChart').getContext('2d');
    new Chart(ctxZonal, {
        type: 'bar',
        data: {
            labels: zonalData.labels,
            datasets: [
                { label: '2017', data: zonalData.y17, backgroundColor: '#cbd5e1' },
                { label: '2022', data: zonalData.y22, backgroundColor: '#3b82f6' },
                { label: '2024', data: zonalData.y24, backgroundColor: '#2563eb' }
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    // 2. National Trend Line
    const total17 = zonalData.y17.reduce((a, b) => a + b, 0);
    const total22 = zonalData.y22.reduce((a, b) => a + b, 0);
    const total24 = zonalData.y24.reduce((a, b) => a + b, 0);

    const ctxTrend = document.getElementById('trendChart').getContext('2d');
    new Chart(ctxTrend, {
        type: 'line',
        data: {
            labels: ['2017', '2022', '2024'],
            datasets: [{
                label: 'Total National Staff Strength',
                data: [total17, total22, total24],
                borderColor: '#059669',
                tension: 0.3,
                fill: true,
                backgroundColor: 'rgba(5, 150, 105, 0.1)'
            }]
        }
    });
}

function handleSearch() {
    const term = document.getElementById('globalSearch').value.toLowerCase();
    const rows = document.getElementById('mainTableBody').getElementsByTagName('tr');
    for (let row of rows) {
        row.style.display = row.cells[0].innerText.toLowerCase().includes(term) ? '' : 'none';
    }
}

window.onload = init;
</script>
</body>
</html>
