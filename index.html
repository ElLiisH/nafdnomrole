<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAFDAC Staff Distribution — Zonal Analysis 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #f3f4f6; /* Off-white background */
    --surface: #ffffff;
    --surface2: #f9fafb;
    --accent: #059669; /* Matured Green */
    --accent-hover: #047857;
    --accent-red: #dc2626; /* Touch of Red */
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --sidebar-width: 280px;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
  }

  /* Sidebar styling - Matured Green Theme */
  nav {
    width: var(--sidebar-width);
    background: #064e3b; /* Deep Green Sidebar */
    color: white;
    padding: 2rem 1.5rem;
    position: fixed;
    height: 100vh;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    z-index: 100;
  }

  .logo-area {
    padding-bottom: 2rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 1rem;
  }

  .logo-area h1 {
    font-family: 'Bebas Neue';
    font-size: 2rem;
    letter-spacing: 1px;
    color: #fff;
  }

  .nav-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ecfdf5;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    font-weight: 500;
    transition: all 0.2s;
  }

  .nav-btn:hover {
    background: var(--accent);
    color: white;
  }

  .nav-btn.active {
    background: var(--accent-red); /* Red touch for active state */
    border-color: var(--accent-red);
    color: white;
  }

  main {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 2.5rem;
  }

  .header-meta {
    margin-bottom: 2.5rem;
  }

  .header-meta h2 {
    font-family: 'Bebas Neue';
    font-size: 3rem;
    color: #064e3b;
    line-height: 1;
  }

  /* Grid layouts */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }

  .zone-card {
    background: var(--surface);
    padding: 1.5rem;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    border-top: 4px solid var(--zone-color);
  }

  .zone-name { color: var(--muted); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
  .zone-count { font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--text); }

  .chart-section {
    background: var(--surface);
    padding: 2rem;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 2.5rem;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04);
  }

  .chart-title {
    font-family: 'Bebas Neue';
    font-size: 1.8rem;
    margin-bottom: 1.5rem;
    color: #064e3b;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .chart-title::before {
    content: "";
    width: 4px;
    height: 24px;
    background: var(--accent-red);
    border-radius: 2px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 1rem;
    background: var(--surface);
  }

  th {
    text-align: left;
    padding: 1rem;
    background: #f1f5f9;
    color: #475569;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 2px solid var(--border);
  }

  td {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }

  .state-row:hover { background: #f8fafc; }
  .td-bold { font-weight: 700; color: #064e3b; }

  #statesGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 1rem;
    margin-top: 2rem;
  }

  .state-card {
    background: var(--surface);
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    text-align: center;
  }

</style>
</head>
<body>

<nav id="sidebar">
    <div class="logo-area">
        <h1>NAFDAC</h1>
        <p style="font-size: 0.7rem; opacity: 0.7;">NOMINAL ROLL SYSTEM</p>
    </div>
    <button class="nav-btn active" onclick="updateFilter('all', this)">Global Overview</button>
    <div id="zoneNavList" style="display:flex; flex-direction:column; gap:0.5rem;">
        </div>
</nav>

<main>
    <header class="header-meta">
        <p style="color: var(--accent-red); font-weight: 700; margin-bottom: 0.5rem;">LIVE REPORTING — FEB 2026</p>
        <h2 id="viewTitle">National Distribution</h2>
    </header>

    <section class="chart-section">
        <div class="chart-title">Zonal Distribution Comparison (2017 vs 2022 vs 2026)</div>
        <div style="height: 350px;">
            <canvas id="zonalComparisonChart"></canvas>
        </div>
    </section>

    <div id="zonesGrid" class="stats-grid"></div>

    <section class="chart-section">
        <div class="chart-title">Staffing Trends by State</div>
        <div style="height: 400px;">
            <canvas id="stateChart"></canvas>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Location/State</th>
                    <th>2017 Records</th>
                    <th>2022 Records</th>
                    <th>2026 Live</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="comparisonTableBody"></tbody>
        </table>

        <div id="statesGrid"></div>
    </section>
</main>

<script>
const zoneColors = {
    'NC': '#10b981', 'NE': '#3b82f6', 'NW': '#8b5cf6',
    'SE': '#f59e0b', 'SS': '#ef4444', 'SW': '#064e3b'
};

const stateMap = {
    'ABU': { name: 'Abuja (CHQ)', zone: 'NC' },
    'LAG': { name: 'Lagos', zone: 'SW' },
    'KAN': { name: 'Kano', zone: 'NW' },
    'ENU': { name: 'Enugu', zone: 'SE' },
    'POR': { name: 'Rivers', zone: 'SS' },
    'BAU': { name: 'Bauchi', zone: 'NE' },
    'OSU': { name: 'Osun', zone: 'SW' },
    'KAD': { name: 'Kaduna', zone: 'NW' }
};

const comparisonData = {
    'ABU': { '2017': 420, '2022': 580, '2026': 712 },
    'LAG': { '2017': 380, '2022': 410, '2026': 445 },
    'KAN': { '2017': 120, '2022': 145, '2026': 188 },
    'ENU': { '2017': 95, '2022': 110, '2026': 134 },
    'POR': { '2017': 110, '2022': 130, '2026': 156 },
    'BAU': { '2017': 85, '2022': 98, '2026': 112 },
    'OSU': { '2017': 70, '2022': 88, '2026': 105 },
    'KAD': { '2017': 90, '2022': 115, '2026': 142 }
};

let zonalChart, stateChart;

function initCharts() {
    // 1. Prepare Zonal Comparison Data
    const zones = Object.keys(zoneColors);
    const zonalAggregated = { '2017': [], '2022': [], '2026': [] };

    zones.forEach(z => {
        let s17 = 0, s22 = 0, s26 = 0;
        Object.keys(stateMap).forEach(st => {
            if(stateMap[st].zone === z) {
                s17 += comparisonData[st]['2017'];
                s22 += comparisonData[st]['2022'];
                s26 += comparisonData[st]['2026'];
            }
        });
        zonalAggregated['2017'].push(s17);
        zonalAggregated['2022'].push(s22);
        zonalAggregated['2026'].push(s26);
    });

    const ctxZonal = document.getElementById('zonalComparisonChart').getContext('2d');
    zonalChart = new Chart(ctxZonal, {
        type: 'bar',
        data: {
            labels: zones,
            datasets: [
                { label: '2017', data: zonalAggregated['2017'], backgroundColor: '#94a3b8' },
                { label: '2022', data: zonalAggregated['2022'], backgroundColor: '#059669' },
                { label: '2026', data: zonalAggregated['2026'], backgroundColor: '#dc2626' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true, grid: { color: '#e5e7eb' } } }
        }
    });

    // 2. State Chart (Initial)
    const ctxState = document.getElementById('stateChart').getContext('2d');
    stateChart = new Chart(ctxState, {
        type: 'bar',
        data: {
            labels: Object.keys(stateMap).map(k => stateMap[k].name),
            datasets: [
                { label: '2017', data: Object.keys(stateMap).map(k => comparisonData[k]['2017']), backgroundColor: '#cbd5e1' },
                { label: '2022', data: Object.keys(stateMap).map(k => comparisonData[k]['2022']), backgroundColor: '#6ee7b7' },
                { label: '2026', data: Object.keys(stateMap).map(k => comparisonData[k]['2026']), backgroundColor: '#059669' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        }
    });
}

function updateFilter(filter, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.getElementById('viewTitle').innerText = filter === 'all' ? 'National Distribution' : `Zone: ${filter} Distribution`;

    const tableBody = document.getElementById('comparisonTableBody');
    tableBody.innerHTML = '';
    
    const filteredStates = Object.keys(stateMap).filter(k => filter === 'all' || stateMap[k].zone === filter);
    
    filteredStates.forEach(k => {
        const d = comparisonData[k];
        tableBody.innerHTML += `
            <tr class="state-row">
                <td class="td-bold">${stateMap[k].name}</td>
                <td>${d['2017']}</td>
                <td>${d['2022']}</td>
                <td style="font-weight:700">${d['2026']}</td>
                <td><span style="color:var(--accent); font-size:0.8rem">● ACTIVE</span></td>
            </tr>`;
    });

    // Update State Chart
    stateChart.data.labels = filteredStates.map(k => stateMap[k].name);
    stateChart.data.datasets[0].data = filteredStates.map(k => comparisonData[k]['2017']);
    stateChart.data.datasets[1].data = filteredStates.map(k => comparisonData[k]['2022']);
    stateChart.data.datasets[2].data = filteredStates.map(k => comparisonData[k]['2026']);
    stateChart.update();

    renderZones(filter);
}

function renderZones(filter) {
    const grid = document.getElementById('zonesGrid');
    const sGrid = document.getElementById('statesGrid');
    grid.innerHTML = ''; sGrid.innerHTML = '';
    const zones = filter === 'all' ? Object.keys(zoneColors) : [filter];
    
    zones.forEach(z => {
        const color = zoneColors[z];
        const stateList = Object.keys(stateMap).filter(k => stateMap[k].zone === z);
        const count = stateList.reduce((acc, k) => acc + comparisonData[k]['2026'], 0);
        grid.innerHTML += `
            <div class="zone-card" style="--zone-color:${color}">
                <div class="zone-name">${z}</div>
                <div class="zone-count">${count}</div>
            </div>`;
            
        stateList.forEach(k => {
            const val = comparisonData[k]['2026'];
            sGrid.innerHTML += `
                <div class="state-card" style="border-bottom: 3px solid ${color}">
                    <div class="td-bold" style="font-size:0.8rem">${stateMap[k].name}</div>
                    <div style="font-family:'Bebas Neue'; font-size:20px; color:var(--text)">${val}</div>
                </div>`;
        });
    });
}

// Build Sidebar Navigation
const zoneNavList = document.getElementById('zoneNavList');
Object.keys(zoneColors).forEach(z => {
    const b = document.createElement('button');
    b.className = 'nav-btn';
    b.innerText = `Zone ${z}`;
    b.onclick = () => updateFilter(z, b);
    zoneNavList.appendChild(b);
});

window.onload = () => {
    initCharts();
    updateFilter('all', document.querySelector('.nav-btn.active'));
};
</script>
</body>
</html>
