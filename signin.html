<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFDAC Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 5px solid #013220; }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        h2 { color: #013220; text-align: center; margin-bottom: 2rem; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #334155; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #013220; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0c3f2c; }
        .error { color: #d32f2f; font-size: 0.875rem; margin-top: 1rem; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🟢 <strong>NAFDAC</strong></div>
        <h2>Admin Portal</h2>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="admin@nafdac.gov.ng">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="handleLogin()">Sign In</button>
        <div id="error-msg" class="error"></div>
    </div>

    <script>
        // Use your actual Supabase credentials here
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
        
            const { data, error } = await supabaseClient.auth.signInWithPassword({ 
                email: email, 
                password: password 
            });
        
            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.style.display = 'block';
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
